        <section class="workspace-layout page-section" data-tool="time-capsule">
          <article class="tool-panel">
            <div class="tool-copy">
              <span class="eyebrow">Create</span>
              <h2>新增時間膠囊</h2>
              <p>適合考試、專題、期末、比賽前寫下承諾，之後回來看自己是否做到。</p>
            </div>
            <div class="tool-grid">
              <label class="field"><span>膠囊標題</span><input data-capsule-title value="期末前的我" /></label>
              <label class="field"><span>解鎖日</span><input data-capsule-date type="date" value="2026-06-15" /></label>
              <label class="field wide"><span>寫給未來的自己</span><textarea data-capsule-message rows="7">我希望自己每天至少專注 30 分鐘，不要把壓力留到最後一天。</textarea></label>
            </div>
            <div class="generated-card" data-output="capsule-preview">
              <strong>期末前的我</strong>
              <p>將於 2026-06-15 解鎖。到時候會一起顯示當時設定的目標與實際完成狀態。</p>
            </div>
            <div class="button-row">
              <button class="button primary" data-action="save-capsule" type="button">保存膠囊</button>
              <button class="button ghost" data-action="download-capsule" type="button">下載文字檔</button>
            </div>
          </article>
          <aside class="panel">
            <span class="eyebrow">Saved</span>
            <h2>已保存膠囊</h2>
            <div class="saved-list" data-capsule-list>
              <article><strong>期末前的我</strong><span>2026-06-15 解鎖</span></article>
