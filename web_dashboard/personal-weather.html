      <main class="main">
        <div class="page-section" style="padding-bottom: 0; padding-top: 20px;"><div class="subnav" style="margin-bottom: 24px;">
              <a href="personal.html">中心總覽</a>
              <a href="personal-trends.html">趨勢</a>
              <a href="personal-pressure.html">壓力雷達</a>
              <a class="active" href="personal-weather.html">自律天氣</a>
              <a href="personal-time-capsule.html">時間膠囊</a>
              <a href="personal-letter.html">未來的信</a>
              <a href="personal-skill-tree.html">人生技能樹</a>
            </div></div>

        <section class="page-section panel">
          <span class="eyebrow">一週自律天氣</span>
          <h2>把每天的風險變成一眼看懂的提醒。</h2>
          <div class="weather-chart-container">
            <div class="chart-bar-group">
              <div class="chart-bar bar-sunny" style="height: 85%;">
                <span class="chart-icon">☀️</span>
              </div>
              <span class="chart-label">週一</span>
              <span class="chart-desc">晴朗穩定</span>
            </div>
            <div class="chart-bar-group">
              <div class="chart-bar bar-sunny" style="height: 90%;">
                <span class="chart-icon">☀️</span>
              </div>
              <span class="chart-label">週二</span>
              <span class="chart-desc">狀態極佳</span>
            </div>
            <div class="chart-bar-group">
              <div class="chart-bar bar-cloudy" style="height: 60%;">
                <span class="chart-icon">☁️</span>
              </div>
              <span class="chart-label">週三</span>
              <span class="chart-desc">能量下降</span>
            </div>
            <div class="chart-bar-group">
              <div class="chart-bar bar-rain" style="height: 40%;">
                <span class="chart-icon">🌧️</span>
              </div>
              <span class="chart-label">週四</span>
              <span class="chart-desc">疲憊微雨</span>
            </div>
            <div class="chart-bar-group">
              <div class="chart-bar bar-storm" style="height: 25%;">
                <span class="chart-icon">⛈️</span>
              </div>
              <span class="chart-label">週五</span>
              <span class="chart-desc">紅色警戒</span>
            </div>
            <div class="chart-bar-group">
              <div class="chart-bar bar-cloudy" style="height: 65%;">
                <span class="chart-icon">⛅</span>
              </div>
              <span class="chart-label">週六</span>
              <span class="chart-desc">逐漸恢復</span>
            </div>
            <div class="chart-bar-group">
              <div class="chart-bar bar-rainbow" style="height: 100%;">
                <span class="chart-icon">🌈</span>
              </div>
              <span class="chart-label">週日</span>
              <span class="chart-desc">狀態滿檔</span>
            </div>
          </div>
        </section>

        <section class="result-board page-section">
          <strong>預報建議</strong>
          <p>週三前先完成報告初稿，週五不要排太重的任務。把自律幣目標放在週一到週四比較穩。</p>
          <button class="button primary" data-toast="已把自律天氣加入下週規劃 Demo">加入下週規劃</button>
        </section>
      </main>

    <script src="assets/app.js?v=2"></script>
