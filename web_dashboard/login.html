<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nudge - 登入 / 註冊</title>
    <link rel="stylesheet" href="assets/styles.css" />
    <!-- Firebase Compat SDK for real-time Firebase Auth and Firestore sync -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
      .login-page {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
        position: relative;
        z-index: 1;
      }
      .login-card {
        width: 100%;
        max-width: 440px;
        padding: 40px;
        text-align: center;
      }
      .login-title {
        font-size: 32px;
        margin-bottom: 12px;
        font-weight: 900;
        letter-spacing: 2px;
      }
      .login-subtitle {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 30px;
      }
      .auth-tabs {
        display: flex;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 999px;
        padding: 4px;
        margin-bottom: 24px;
      }
      .auth-tab {
        flex: 1;
        padding: 12px;
        border-radius: 999px;
        color: var(--muted);
        font-weight: 800;
        cursor: pointer;
        transition: 200ms ease;
      }
      .auth-tab.active {
        background: var(--page-wash);
        color: var(--page-accent);
      }
      .input-group {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 0 16px;
        margin-bottom: 16px;
        transition: 200ms ease;
      }
      .input-group:focus-within {
        border-color: var(--page-accent);
        box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
      }
      .input-group span {
        color: var(--muted);
        margin-right: 12px;
        font-size: 20px;
      }
      .input-group input {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--text);
        padding: 16px 0;
        font-size: 15px;
        outline: none;
      }
      .input-group .toggle-pwd {
        cursor: pointer;
        color: var(--muted);
      }
      .submit-btn {
        width: 100%;
        margin-top: 8px;
        padding: 16px;
        font-size: 16px;
        border-radius: 16px;
      }
      .divider {
        display: flex;
        align-items: center;
        margin: 24px 0;
        color: var(--muted);
        font-size: 12px;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--line);
        margin: 0 12px;
      }
      .social-login {
        display: flex;
        gap: 16px;
        margin-bottom: 30px;
      }
      .social-btn {
        flex: 1;
        padding: 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--line);
        color: var(--text);
        font-weight: 800;
        cursor: pointer;
        transition: 200ms ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }
      .social-btn:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      .skip-link {
        color: var(--muted);
        text-decoration: underline;
        font-size: 13px;
        cursor: pointer;
      }
      .skip-link:hover {
        color: var(--text);
      }
      /* Mobile bottom nav style to match user request */
      .mobile-nav {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(3, 5, 10, 0.95);
        border-top: 1px solid var(--line);
        padding: 12px 20px 24px;
        justify-content: space-between;
        z-index: 100;
        backdrop-filter: blur(10px);
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }
      .nav-item.active {
        color: var(--page-accent);
      }
      .nav-item span {
        font-size: 24px;
      }
      @media (max-width: 600px) {
        .mobile-nav {
          display: flex;
        }
        .login-page {
          padding-bottom: 90px;
        }
      }
    </style>
  </head>
  <body data-page="home">
    <div class="login-page">
      <div class="panel login-card">
        <h1 class="login-title" id="loginTitle">建立你的自律身分</h1>
        <p class="login-subtitle" id="loginSubtitle">同步你的進度，與全球好友一同專注</p>

        <!-- Error Message Banner -->
        <div id="errorMsg" style="display: none; color: #ff4a5a; background: rgba(255, 74, 90, 0.1); border: 1px solid rgba(255, 74, 90, 0.2); padding: 12px; border-radius: 12px; margin-bottom: 20px; font-size: 14px; font-weight: 700; text-align: center;"></div>

        <div class="auth-tabs">
          <div class="auth-tab" id="tabLogin">登入</div>
          <div class="auth-tab active" id="tabRegister">註冊</div>
        </div>

        <form id="loginForm">
          <div class="input-group" id="groupNickname">
            <span>👤</span>
            <input type="text" placeholder="自律暱稱" required />
          </div>
          <div class="input-group">
            <span>✉️</span>
            <input type="email" placeholder="電子郵件" required />
          </div>
          <div class="input-group">
            <span>🔒</span>
            <input type="password" placeholder="密碼" required />
            <span class="toggle-pwd">👁️</span>
          </div>
          <div class="input-group" id="groupConfirm">
            <span>🔒</span>
            <input type="password" placeholder="確認密碼" required />
            <span class="toggle-pwd">👁️</span>
          </div>

          <button type="submit" class="button primary submit-btn" id="submitBtn">建立帳號並登入</button>
        </form>

        <div class="social-login">
          <button type="button" class="social-btn" id="btnGoogle" style="flex: 1;">
            G Google
          </button>
          <button type="button" class="social-btn" id="btnApple" style="flex: 1;">
            🍎 Apple
          </button>
        </div>
        <div class="social-login" style="margin-top: -16px; margin-bottom: 24px;">
          <button type="button" class="social-btn" id="btnFacebook" style="flex: 1;">
            👤 Facebook
          </button>
        </div>

        <a href="index.html" class="skip-link">稍後再說，先體驗功能</a>
      </div>
    </div>

    <!-- Mobile Nav Bar (Visible on small screens) -->
    <div class="mobile-nav">
      <div class="nav-item">
        <span>🏠</span>
        首頁
      </div>
      <div class="nav-item">
        <span>✨</span>
        角色
      </div>
      <div class="nav-item">
        <span>⏱️</span>
        專注
      </div>
      <div class="nav-item">
        <span>👥</span>
        社交
      </div>
      <div class="nav-item">
        <span>❤️</span>
        健康
      </div>
      <div class="nav-item active">
        <span>👤</span>
        帳號
      </div>
    </div>

    <script>
      // Firebase Config
      const firebaseConfig = {
        apiKey: "AIzaSyCsvP-r0EygpkhH0Zwzfrl4uFzy6LcbsTQ",
        authDomain: "nudge-discipline-app.firebaseapp.com",
        projectId: "nudge-discipline-app",
        storageBucket: "nudge-discipline-app.firebasestorage.app",
        messagingSenderId: "497972469632",
        appId: "1:497972469632:web:cb87819a70c7cb8f2f6b65"
      };

      // Initialize Firebase
      if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
      }
      const auth = firebase.auth();
      const db = firebase.firestore();

      // Show/Hide Error Helper
      function showError(msg) {
        const errDiv = document.getElementById('errorMsg');
        if (msg) {
          errDiv.textContent = msg;
          errDiv.style.display = 'block';
        } else {
          errDiv.style.display = 'none';
        }
      }

      // Sync user profile to Firestore (creates it if missing)
      function syncUserProfile(user, nickname) {
        showError("");
        const userRef = db.collection("users").doc(user.uid);
        return userRef.get().then((docSnap) => {
          if (!docSnap.exists) {
            const now = firebase.firestore.FieldValue.serverTimestamp();
            return userRef.set({
              id: user.uid,
              email: user.email,
              nickname: nickname || user.displayName || user.email.split('@')[0],
              myNudgeId: 'NDG_' + user.uid.substring(0, 6).toUpperCase(),
              username: 'NDG_' + user.uid.substring(0, 6).toUpperCase(),
              disciplineCoins: 0,
              planetCount: 0,
              weeklyPlanetEarned: false,
              tasks: [],
              dailySummaries: [],
              createdAt: now,
              updatedAt: now
            }, { merge: true });
          }
        }).then(() => {
          localStorage.setItem('nudgeWebLoggedIn', 'true');
          localStorage.setItem('nudgeActiveDemoUserId', user.uid);
          window.location.href = 'index.html';
        }).catch((err) => {
          console.error("Firestore sync error:", err);
          showError("同步使用者資料失敗：" + err.message);
        });
      }

      // Password visibility toggler
      document.querySelectorAll('.toggle-pwd').forEach(toggle => {
        toggle.addEventListener('click', (e) => {
          const input = e.target.previousElementSibling;
          if (input.type === 'password') {
            input.type = 'text';
            e.target.textContent = '🙈';
          } else {
            input.type = 'password';
            e.target.textContent = '👁️';
          }
        });
      });

      // Tab switching logic
      const tabLogin = document.getElementById('tabLogin');
      const tabRegister = document.getElementById('tabRegister');
      const groupNickname = document.getElementById('groupNickname');
      const groupConfirm = document.getElementById('groupConfirm');
      const loginTitle = document.getElementById('loginTitle');
      const loginSubtitle = document.getElementById('loginSubtitle');
      const submitBtn = document.getElementById('submitBtn');
      
      const nicknameInput = groupNickname.querySelector('input');
      const confirmInput = groupConfirm.querySelector('input');

      let isLoginMode = false; // Default is register mode (tabRegister active)

      tabLogin.addEventListener('click', () => {
        isLoginMode = true;
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
        
        groupNickname.style.display = 'none';
        groupConfirm.style.display = 'none';
        nicknameInput.required = false;
        confirmInput.required = false;
        
        loginTitle.textContent = '歡迎回來';
        loginSubtitle.textContent = '繼續你的自律旅程';
        submitBtn.textContent = '登入';
        showError("");
      });

      tabRegister.addEventListener('click', () => {
        isLoginMode = false;
        tabRegister.classList.add('active');
        tabLogin.classList.remove('active');
        
        groupNickname.style.display = 'flex';
        groupConfirm.style.display = 'flex';
        nicknameInput.required = true;
        confirmInput.required = true;
        
        loginTitle.textContent = '建立你的自律身分';
        loginSubtitle.textContent = '同步你的進度，與全球好友一同專注';
        submitBtn.textContent = '建立帳號並登入';
        showError("");
      });

      // Form Submission
      document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        showError("");

        const email = e.target.querySelector('input[type="email"]').value.trim();
        const password = e.target.querySelector('input[type="password"]').value;

        if (isLoginMode) {
          // Log In
          submitBtn.disabled = true;
          submitBtn.textContent = "登入中...";
          auth.signInWithEmailAndPassword(email, password)
            .then((result) => {
              syncUserProfile(result.user);
            })
            .catch((err) => {
              submitBtn.disabled = false;
              submitBtn.textContent = "登入";
              showError("登入失敗：" + err.message);
            });
        } else {
          // Register
          const nickname = nicknameInput.value.trim();
          const confirmPassword = confirmInput.value;

          if (password !== confirmPassword) {
            showError("兩次輸入的密碼不一致！");
            return;
          }

          submitBtn.disabled = true;
          submitBtn.textContent = "建立帳號中...";
          auth.createUserWithEmailAndPassword(email, password)
            .then((result) => {
              // Send verification email in background
              result.user.sendEmailVerification().then(() => {
                console.log("Verification email sent.");
              }).catch((e) => {
                console.warn("Could not send email verification:", e);
              });
              
              return syncUserProfile(result.user, nickname).then(() => {
                alert("已成功註冊！我們已發送一封電子郵件驗證信至 " + email + "，請至您的信箱查看。（您現在仍可直接開始體驗功能）");
              });
            })
            .catch((err) => {
              submitBtn.disabled = false;
              submitBtn.textContent = "建立帳號並登入";
              showError("註冊失敗：" + err.message);
            });
        }
      });

      // Apple Sign-In (Demo Alert — requires paid Apple Developer account)
      function showAppleAlert() {
        showError('Apple 登入需要配備 Apple 付費開發者帳號（年費 $99 美元）並在 Firebase 控制台填入 Team ID、Service ID 與 .p8 私鑰後才可使用。請改用 Google 或 Email 登入。');
      }
      document.getElementById('btnApple').addEventListener('click', (e) => {
        e.preventDefault();
        showError('');
        showAppleAlert();
      });

      // Google Sign-In (Real Integration)
      document.getElementById('btnGoogle').addEventListener('click', (e) => {
        e.preventDefault();
        showError('');
        const provider = new firebase.auth.GoogleAuthProvider();
        auth.signInWithPopup(provider)
          .then((result) => { syncUserProfile(result.user); })
          .catch((err) => { showError('Google 登入失敗：' + err.message); });
      });

      // Facebook Sign-In (Real Integration)
      document.getElementById('btnFacebook').addEventListener('click', (e) => {
        e.preventDefault();
        showError('');
        const provider = new firebase.auth.FacebookAuthProvider();
        auth.signInWithPopup(provider)
          .then((result) => { syncUserProfile(result.user); })
          .catch((err) => { showError('Facebook 登入失敗：' + err.message); });
      });

    </script>
  </body>
</html>
